
<style>
@import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&display=swap');
html,body{margin:0;padding:0;width:100%;height:100%;overflow:hidden;background:#fff0f3}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
#wrap{
  width:100%;
  height:100vh;
  background:#fff0f3;
  position:relative;
  overflow:hidden;
  border-radius:0;
}
#ov{
  position:absolute;inset:0;
  display:flex;align-items:center;justify-content:center;
  background:#fff0f3;
  z-index:50;
  transition:opacity .7s;
}
.card{
  background:#fff;
  border-radius:20px;
  padding:2rem 2rem;
  text-align:center;
  box-shadow:0 6px 30px rgba(255,77,109,.18);
  width:80%;
}
.card h2{
  font-family:'Dancing Script',cursive;
  font-size:1.7rem;
  color:#c9184a;
  margin-bottom:1.2rem;
  line-height:1.3;
}
#btn{
  background:#ff4d6d;
  color:#fff;
  border:none;
  border-radius:50px;
  padding:.8rem 1.8rem;
  font-size:1rem;
  font-weight:600;
  cursor:pointer;
  box-shadow:0 4px 14px rgba(255,77,109,.35);
}
#btn:active{transform:scale(.95)}
#mn{position:absolute;inset:0;display:none}
canvas{display:block;width:100%;height:100%}
#msg{
  position:absolute;
  bottom:25px;left:0;right:0;
  padding:14px 20px 20px;
  background:linear-gradient(to top,#fff0f3 55%,transparent);
  text-align:center;
  opacity:0;
  transition:opacity 1s;
  pointer-events:none;
}
#msg.show{opacity:1}
.line{
  font-family:'Dancing Script',cursive;
  font-size:1.1rem;
  color:#800f2f;
  display:block;
  line-height:1.65;
  opacity:0;
  transform:translateY(5px);
  transition:opacity .6s,transform .6s;
}
.line.on{opacity:1;transform:none}
.hf{
  position:absolute;
  pointer-events:none;
  font-size:.95rem;
  animation:up 5s ease-in forwards;
}
@keyframes up{
  0%{transform:translateY(0);opacity:.8}
  100%{transform:translateY(-540px);opacity:0}
}
</style>

<div id="wrap">

  <div id="ov">
    <div class="card">
      <h2>Kuch khaas aapke liye 🌸</h2>
      <button id="btn">Kholein ❤️</button>
    </div>
  </div>

  <div id="mn">
    <canvas id="cv"></canvas>
    <div id="msg">
      <span class="line">Hey you 💞</span>
      <span class="line">Happy Birthday 🎈</span>
      <span class="line">May God bless you 🍀</span>
      <span class="line">And give you many happiness 💕</span>
      <span class="line">You're pretty awesome ❤️</span>
      <span class="line">Hope you have a great day! 😘</span>
    </div>
  </div>

</div>

<script>
(function(){
  var wrap = document.getElementById('wrap');
  var W = wrap.offsetWidth || 360;
  var H = window.innerHeight;
  var cv = document.getElementById('cv');
  cv.width = W; cv.height = H;
  var ctx = cv.getContext('2d');

  function ri(a,b){return a+Math.floor(Math.random()*(b-a+1))}
  function rf(a,b){return a+Math.random()*(b-a)}

  function Pt(x,y){this.x=x||0;this.y=y||0}
  Pt.prototype={
    clone:function(){return new Pt(this.x,this.y)},
    add:function(o){var p=this.clone();p.x+=o.x;p.y+=o.y;return p},
    mul:function(n){var p=this.clone();p.x*=n;p.y*=n;return p},
    div:function(n){var p=this.clone();p.x/=n;p.y/=n;return p},
    sub:function(o){var p=this.clone();p.x-=o.x;p.y-=o.y;return p}
  };

  function bz(cp,t){
    return cp[0].mul((1-t)*(1-t)).add(cp[1].mul(2*t*(1-t))).add(cp[2].mul(t*t));
  }

  function Heart(){
    var a=[],x,y,t;
    for(var i=10;i<30;i+=0.2){
      t=i/Math.PI;
      x=16*Math.pow(Math.sin(t),3);
      y=13*Math.cos(t)-5*Math.cos(2*t)-2*Math.cos(3*t)-Math.cos(4*t);
      a.push(new Pt(x,y));
    }
    this.pts=a;this.len=a.length;
  }
  Heart.prototype={get:function(i,s){return this.pts[i].mul(s||1)}};
  var hfig=new Heart();

  function inHeart(x,y,r){
    var a=x/r,b=y/r;
    return(a*a+b*b-1)*(a*a+b*b-1)*(a*a+b*b-1)-a*a*b*b*b<0;
  }

  var sx=W/1100;
  var treeH=H*0.72;
  var sy=treeH/680;

  function sp(x,y){return new Pt(x*sx,y*sy)}
  function sr(r){return r*Math.min(sx,sy)*1.2}

  function Branch(p1,p2,p3,rad,len,ch){
    this.p1=p1;this.p2=p2;this.p3=p3;
    this.rad=rad;this.len=len||100;
    this.i=0;this.t=1/(this.len-1);
    this.ch=ch||[];this.done=false;
  }
  Branch.prototype={
    grow:function(){
      if(this.i<=this.len){
        var p=bz([this.p1,this.p2,this.p3],this.i*this.t);
        ctx.save();
        ctx.beginPath();
        ctx.fillStyle='#ffb3c6';
        ctx.arc(p.x,p.y,this.rad,0,Math.PI*2);
        ctx.fill();
        ctx.restore();
        this.i++;this.rad*=0.97;
      } else {
        this.done=true;
        for(var i=0;i<this.ch.length;i++) bArr.push(this.ch[i]);
      }
    }
  };

  function mb(a){
    var p1=sp(a[0],a[1]),p2=sp(a[2],a[3]),p3=sp(a[4],a[5]);
    var ch=[];
    if(a[8]) for(var i=0;i<a[8].length;i++) ch.push(mb(a[8][i]));
    return new Branch(p1,p2,p3,sr(a[6]),a[7],ch);
  }

  var defs=[
    [535,680,570,250,500,200,30,100,[
      [540,500,455,417,340,400,13,100,[[450,435,434,430,394,395,2,40]]],
      [550,445,600,356,680,345,12,100,[[578,400,648,409,661,426,3,80]]],
      [539,281,537,248,534,217,3,40],
      [546,397,413,247,328,244,9,80,[[427,286,383,253,371,205,2,40],[498,345,435,315,395,330,4,60]]],
      [546,357,608,252,678,221,6,100,[[590,293,646,277,648,271,2,80]]]
    ]]
  ];

  var bArr=[];
  for(var i=0;i<defs.length;i++) bArr.push(mb(defs[i]));

  function Bloom(pt){
    this.pt=pt;
    this.col='rgb(255,'+ri(60,220)+','+ri(60,180)+')';
    this.al=rf(.35,.9);
    this.ang=rf(0,Math.PI*2);
    this.sc=0.04;
  }
  Bloom.prototype={
    flower:function(){
      ctx.save();
      ctx.fillStyle=this.col;
      ctx.globalAlpha=this.al;
      ctx.translate(this.pt.x,this.pt.y);
      ctx.scale(this.sc,this.sc);
      ctx.rotate(this.ang);
      ctx.beginPath();ctx.moveTo(0,0);
      for(var i=0;i<hfig.len;i++){var p=hfig.get(i);ctx.lineTo(p.x,-p.y);}
      ctx.closePath();ctx.fill();ctx.restore();
      this.sc+=0.07;
      return this.sc>1;
    }
  };

  var bCache=[];
  var bW=W*0.9,bH=treeH*0.85;
  var bR=Math.min(W,treeH)*0.30;
  for(var i=0;i<520;i++){
    var tries=0;
    while(tries<250){
      var bx=ri(8,bW-8),by=ri(8,bH-8);
      if(inHeart(bx-bW/2,bH-(bH-25)/2-by,bR)){
        bCache.push(new Bloom(new Pt(bx,by)));break;
      }
      tries++;
    }
  }

  var blooms=[];
  var phase=0,lastT=0;
  var seedPt=sp(535,200);

  function drawSeed(){
    ctx.save();
    ctx.fillStyle='#ff4d6d';
    ctx.globalAlpha=.85;
    ctx.translate(seedPt.x,seedPt.y);
    ctx.beginPath();ctx.moveTo(0,0);
    for(var i=0;i<hfig.len;i++){
      var p=hfig.get(i,sr(2)*0.45);
      ctx.lineTo(p.x,-p.y);
    }
    ctx.closePath();ctx.fill();ctx.restore();
  }

  function drawGround(){
    ctx.save();
    ctx.strokeStyle='rgba(200,100,130,.25)';
    ctx.lineWidth=2;ctx.lineCap='round';
    ctx.beginPath();
    ctx.moveTo(W/2-60,treeH-4);ctx.lineTo(W/2+60,treeH-4);
    ctx.stroke();ctx.restore();
  }

  function loop(ts){
    requestAnimationFrame(loop);
    if(phase===0) return;
    if(phase===1){
      var done=true;
      for(var i=bArr.length-1;i>=0;i--){
        if(!bArr[i].done){bArr[i].grow();done=false;}
        else bArr.splice(i,1);
      }
      drawGround();drawSeed();
      if(done&&bArr.length===0) phase=2;
    } else if(phase===2){
      drawGround();
      if(ts-lastT>16&&bCache.length>0){
        var batch=bCache.splice(0,5);
        for(var b=0;b<batch.length;b++) blooms.push(batch[b]);
        lastT=ts;
      }
      for(var j=blooms.length-1;j>=0;j--){
        if(blooms[j].flower()) blooms.splice(j,1);
      }
      if(bCache.length===0&&blooms.length===0){
        phase=3;showMsg();startHearts();
      }
    }
  }

  function showMsg(){
    var m=document.getElementById('msg');
    m.classList.add('show');
    var ls=m.querySelectorAll('.line');
    for(var i=0;i<ls.length;i++){
      (function(l,d){setTimeout(function(){l.classList.add('on')},d)})(ls[i],i*480+200);
    }
  }

  function startHearts(){
    setInterval(function(){
      var h=document.createElement('div');
      h.className='hf';
      h.textContent=['❤️','💕','💖','🌸','✨'][Math.floor(Math.random()*5)];
      h.style.left=Math.random()*88+'%';
      h.style.bottom='0';
      h.style.animationDuration=(3+Math.random()*2.5)+'s';
      document.getElementById('mn').appendChild(h);
      setTimeout(function(){h.remove()},6000);
    },380);
  }

  document.getElementById('btn').addEventListener('click',function(){
    var ov=document.getElementById('ov');
    ov.style.opacity='0';
    setTimeout(function(){ov.style.display='none'},700);
    document.getElementById('mn').style.display='block';
    drawSeed();drawGround();
    phase=1;
    requestAnimationFrame(loop);
  });

})();
</script>
