<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Happy Birthday</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  overflow:hidden;
  height:100svh;
  font-family:Poppins,sans-serif;
  background:#fff5f7;
}
#scene{
  height:100svh;
  position:relative;
}

/* Background image - same folder, naam "0" */
#scene::before{
  content:'';
  position:absolute;
  inset:0;
  background-image:url('0.png');
  background-size:cover;
  background-position:center;
  background-repeat:no-repeat;
  opacity:0.18;
  z-index:0;
}

/* Pink gradient upar se */
#scene::after{
  content:'';
  position:absolute;
  inset:0;
  background:linear-gradient(180deg,
    rgba(255,245,247,0.55) 0%,
    rgba(255,230,238,0.45) 100%
  );
  z-index:1;
}

canvas{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  z-index:2;
}

.message{
  position:absolute;
  left:50%;
  bottom:2svh;
  transform:translateX(-50%);
  width:min(88vw,520px);
  padding:14px 18px;
  background:rgba(255,255,255,.30);
  backdrop-filter:blur(18px);
  -webkit-backdrop-filter:blur(18px);
  border:1px solid rgba(255,255,255,.50);
  border-radius:26px;
  text-align:center;
  box-shadow:0 10px 30px rgba(255,105,180,.12);
  animation:fade .9s ease;
  z-index:3;
}
.title{
  font-size:clamp(1.5rem,5vw,2.2rem);
  font-weight:700;
  color:#c9184a;
  margin-bottom:10px;
}
.text{
  font-size:clamp(.82rem,2.4vw,.95rem);
  line-height:1.6;
  color:#6d1632;
}
@keyframes fade{
  from{opacity:0;transform:translate(-50%,20px)}
  to{opacity:1;transform:translate(-50%,0)}
}
</style>
</head>
<body>
<div id="scene">
  <canvas id="c"></canvas>
  <div class="message">
    <div class="title">Happy Birthday! 🎉</div>
    <div class="text">
      May your day be filled with love, laughter &amp; beautiful memories. 💖<br><br>
      May all your dreams come true and happiness follow you everywhere. ✨<br><br>
      Wishing you endless joy, success &amp; blessings today and always. 🌸
    </div>
  </div>
</div>

<script>
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
let W, H;

function resize(){
  W = canvas.width  = innerWidth;
  H = canvas.height = innerHeight;
}
resize();
addEventListener('resize', resize);

/* Heart shape points */
const heartPts = [];
for(let i = 0; i < 700; i++){
  const t = Math.random() * Math.PI * 2;
  const x = 16 * Math.pow(Math.sin(t), 3);
  const y = -(13*Math.cos(t) - 5*Math.cos(2*t) - 2*Math.cos(3*t) - Math.cos(4*t));
  heartPts.push({
    x, y,
    r: 1.6 + Math.random() * 2.8,
    c: ['#ff4d6d','#ff8fab','#ffb3c6','#ff758f','#ffd6e0','#ff6b8a'][Math.floor(Math.random()*6)]
  });
}

/* Floating emojis */
const floaters = [];
const emojis   = ['💖','💕','✨','🌸','❤️','🎀'];
for(let i = 0; i < 32; i++){
  floaters.push({
    x: Math.random() * innerWidth,
    y: Math.random() * innerHeight,
    e: emojis[Math.floor(Math.random() * emojis.length)],
    v: 0.25 + Math.random() * 0.55,
    size: 12 + Math.random() * 10
  });
}

function draw(){
  ctx.clearRect(0, 0, W, H);

  const msgH    = H * 0.30;
  const usableH = H - msgH;
  const cx      = W / 2;
  const cy      = usableH * 0.42 + Math.sin(Date.now() / 950) * 5;
  const hs      = Math.min(W / 440, usableH / 420) * 12;

  /* Heart bloom */
  ctx.save();
  ctx.shadowBlur  = 14;
  ctx.shadowColor = 'rgba(255,100,160,.4)';
  for(const h of heartPts){
    ctx.fillStyle = h.c;
    ctx.beginPath();
    ctx.arc(
      cx + h.x * hs,
      cy + h.y * hs,
      h.r * Math.max(.75, hs / 12),
      0, Math.PI * 2
    );
    ctx.fill();
  }
  ctx.restore();

  /* Floating emojis */
  for(const f of floaters){
    ctx.font = f.size + 'px serif';
    ctx.fillText(f.e, f.x, f.y);
    f.y -= f.v;
    if(f.y < -20){ f.y = H + 20; f.x = Math.random() * W; }
  }

  requestAnimationFrame(draw);
}

draw();
</script>
</body>
</html>
