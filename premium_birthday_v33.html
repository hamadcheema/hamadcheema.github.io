<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Happy Birthday</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
--bg1:#fff5f7;--bg2:#ffe6ee;--accent:#c9184a;
}
body{
height:100svh;overflow:hidden;
font-family:Poppins,sans-serif;
background:linear-gradient(180deg,var(--bg1),var(--bg2));
}
#overlay,#scene{height:100svh}
#overlay{
position:fixed;inset:0;display:flex;justify-content:center;align-items:center;
background:linear-gradient(180deg,var(--bg1),var(--bg2));z-index:10;
}
.card{
background:rgba(255,255,255,.8);
backdrop-filter:blur(12px);
padding:clamp(20px,4vw,30px);
width:min(90vw,420px);
border-radius:28px;
text-align:center;
box-shadow:0 15px 50px rgba(255,105,180,.18);
}
.card h1{font-family:"Dancing Script",cursive;color:var(--accent);margin-bottom:12px}
button{
border:none;padding:14px 28px;border-radius:999px;
background:#ff4d6d;color:#fff;font-weight:600;cursor:pointer;
}
#scene{display:none;position:relative}
canvas{position:absolute;inset:0;width:100%;height:100%}

.message{
position:absolute;
left:50%;
bottom:max(2svh,12px);
transform:translateX(-50%);
width:min(88vw,520px);
padding:clamp(14px,2vw,18px);
background:rgba(255,255,255,.28);
backdrop-filter:blur(18px);
border:1px solid rgba(255,255,255,.45);
border-radius:24px;
text-align:center;
box-shadow:0 8px 30px rgba(201,24,74,.12);
animation:fadeUp 1.4s ease;
max-height:34svh;
overflow:auto;
}
.title{
font-size:clamp(1.5rem,4vw,2.3rem);
font-weight:700;color:var(--accent);
margin-bottom:.5rem;
text-shadow:0 0 14px rgba(255,105,180,.25);
}
.text{
font-size:clamp(.84rem,2.2vw,1rem);
line-height:1.55;
color:#6d1632;
}
@keyframes fadeUp{
from{opacity:0;transform:translate(-50%,18px)}
to{opacity:1;transform:translate(-50%,0)}
}
</style>
</head>
<body>
<div id="overlay">
  <div class="card">
    <h1>🎂 A Special Surprise 🎂</h1>
    <p style="margin-bottom:20px">Tap below to open your birthday wishes.</p>
    <button onclick="start()">Open Gift 🎁</button>
  </div>
</div>

<div id="scene">
<canvas id="c"></canvas>

<div class="message">
<div class="title">Happy Birthday! 🎉</div>
<div class="text">
May your day be filled with love, laughter, and beautiful memories. 💖<br><br>
May all your dreams come true and happiness follow you wherever you go. ✨<br><br>
Wishing you endless joy, success, and blessings today and always. 🌸
</div>
</div>
</div>

<script>
function start(){
overlay.style.display='none';
scene.style.display='block';
}

const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');

let scale=1, treeOffset=0;

function resize(){
canvas.width=innerWidth;
canvas.height=innerHeight;
scale=Math.min(innerWidth/430, innerHeight/900)*1.15;
}
resize();
addEventListener('resize',resize);

const hearts=[];
for(let i=0;i<700;i++){
 const t=Math.random()*Math.PI*2;
 const x=16*Math.pow(Math.sin(t),3);
 const y=-(13*Math.cos(t)-5*Math.cos(2*t)-2*Math.cos(3*t)-Math.cos(4*t));
 hearts.push({
   hx:x*18+(Math.random()*16-8),
   hy:y*18+(Math.random()*16-8),
   s:3+Math.random()*4,
   c:['#ff4d6d','#ff8fab','#ffb3c6','#ff758f','#ffd166'][Math.floor(Math.random()*5)]
 });
}

const floaters=[];
for(let i=0;i<65;i++){
 floaters.push({
  x:Math.random()*innerWidth,
  y:Math.random()*innerHeight,
  e:['💖','💕','✨','🌸','❤️'][Math.floor(Math.random()*5)],
  v:0.25+Math.random()*0.8
 });
}

function draw(){
ctx.clearRect(0,0,canvas.width,canvas.height);

const t=Date.now()*0.001;
treeOffset=Math.sin(t*1.2)*8;

const cx=canvas.width/2;
const cy=canvas.height*0.24;

ctx.save();
ctx.translate(0,treeOffset);

const trunkH=Math.min(canvas.height*0.18,140*scale);
const trunkW=Math.max(16,24*scale);

ctx.fillStyle="#f4a7bb";
ctx.shadowBlur=18;
ctx.shadowColor="rgba(255,105,180,.35)";

ctx.beginPath();
ctx.rect(cx-trunkW/2, cy+110*scale, trunkW, trunkH);
ctx.fill();

for(const h of hearts){
 ctx.fillStyle=h.c;
 ctx.beginPath();
 ctx.arc(cx+h.hx*scale, cy+h.hy*scale, h.s*scale,0,Math.PI*2);
 ctx.fill();
}

ctx.restore();

ctx.font=`${Math.max(14,18*scale)}px serif`;
for(const f of floaters){
 ctx.fillText(f.e,f.x,f.y);
 f.y-=f.v;
 if(f.y<-20){f.y=innerHeight+20;f.x=Math.random()*innerWidth;}
}

requestAnimationFrame(draw);
}
draw();
</script>
</body>
</html>
