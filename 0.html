<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Happy Birthday</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
overflow:hidden;height:100svh;
background:linear-gradient(180deg,#fff5f7,#ffe6ee);
font-family:Poppins,sans-serif;
}
#scene{height:100svh;position:relative}
canvas{position:absolute;inset:0;width:100%;height:100%}

.message{
position:absolute;
left:50%;
bottom:2svh;
transform:translateX(-50%);
width:min(88vw,520px);
max-height:30svh;
overflow:auto;
padding:14px 18px;
background:rgba(255,255,255,.28);
backdrop-filter:blur(18px);
border:1px solid rgba(255,255,255,.45);
border-radius:26px;
text-align:center;
box-shadow:0 10px 30px rgba(255,105,180,.12);
animation:fade .9s ease;
}
.title{
font-size:clamp(1.7rem,5vw,2.4rem);
font-weight:700;color:#c9184a;
margin-bottom:10px;
}
.text{
font-size:clamp(.9rem,2.4vw,1rem);
line-height:1.55;color:#6d1632;
}
@keyframes fade{
from{opacity:0;transform:translate(-50%,20px)}
to{opacity:1;transform:translate(-50%,0)}
}
</style>
</head>
<body>
<div id="scene">
<canvas id="c"></canvas>

<div class="message">
<div class="title">Happy Birthday! 🎉</div>
<div class="text">
May your day be filled with love, laughter, and beautiful memories. 💖<br><br>
May all your dreams come true and happiness follow you wherever you go. ✨<br><br>
Wishing you endless joy, success, and blessings today and always. 🌸
</div>
</div>
</div>

<script>
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');

let W,H,scale;

function resize(){
 W=canvas.width=innerWidth;
 H=canvas.height=innerHeight;
 scale=Math.min(W/700,H/1200);
}
resize();
addEventListener('resize',resize);

const hearts=[];
for(let i=0;i<650;i++){
 const t=Math.random()*Math.PI*2;
 const x=16*Math.pow(Math.sin(t),3);
 const y=-(13*Math.cos(t)-5*Math.cos(2*t)-2*Math.cos(3*t)-Math.cos(4*t));
 hearts.push({
   x,y,
   r:2+Math.random()*3,
   c:['#ff4d6d','#ff8fab','#ffb3c6','#ff758f','#ffd166'][Math.floor(Math.random()*5)]
 });
}

const floaters=[];
for(let i=0;i<40;i++){
 floaters.push({
  x:Math.random()*W,y:Math.random()*H,
  e:['💖','💕','✨','🌸','❤️'][Math.floor(Math.random()*5)],
  v:0.3+Math.random()*0.6
 });
}

function draw(){
 ctx.clearRect(0,0,W,H);

 const treeArea=H*0.58;
 const cardTop=H*0.68;
 const cx=W/2;
 const cy=treeArea*0.42 + Math.sin(Date.now()/900)*5;

 const heartScale=Math.min(W/430,H/900)*12.5;

 ctx.save();
 ctx.shadowBlur=18;
 ctx.shadowColor='rgba(255,105,180,.45)';

 for(const h of hearts){
   ctx.fillStyle=h.c;
   ctx.beginPath();
   ctx.arc(
      cx + h.x*heartScale,
      cy + h.y*heartScale,
      h.r*Math.max(.8,heartScale/12),
      0,Math.PI*2
   );
   ctx.fill();
 }

 const trunkTop=cy+115*heartScale/12;
 const trunkH=Math.max(70,H*0.10);
 const trunkW=Math.max(16,W*0.045);

 ctx.fillStyle='#e8a3b8';
 ctx.fillRect(cx-trunkW/2,trunkTop,trunkW,Math.min(trunkH,cardTop-trunkTop-18));
 ctx.restore();

 ctx.font=`${Math.max(14,W*0.045)}px serif`;
 for(const f of floaters){
   ctx.fillText(f.e,f.x,f.y);
   f.y-=f.v;
   if(f.y<-20){f.y=H+20;f.x=Math.random()*W;}
 }

 requestAnimationFrame(draw);
}
draw();
</script>
</body>
</html>
