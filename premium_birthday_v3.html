<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Birthday V3</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{
height:100vh;overflow:hidden;
font-family:Arial,sans-serif;
background:linear-gradient(180deg,#fff7fa,#ffeaf1);
}
.wrap{position:relative;height:100vh}
.tree{
position:absolute;left:50%;top:7%;
transform:translateX(-50%);
font-size:min(55vw,260px);
line-height:1;
filter:drop-shadow(0 8px 15px rgba(255,105,180,.25));
}
.float{position:absolute;animation:up linear infinite}
@keyframes up{from{transform:translateY(110vh)}to{transform:translateY(-15vh)}}
.card{
position:absolute;
left:50%;bottom:4%;
transform:translateX(-50%);
width:min(92%,600px);
background:rgba(255,255,255,.72);
backdrop-filter:blur(10px);
border-radius:24px;
padding:18px;
text-align:center;
box-shadow:0 10px 30px rgba(0,0,0,.08);
}
h1{color:#d81b60;font-size:clamp(1.8rem,7vw,3rem);margin-bottom:10px}
p{font-size:clamp(.9rem,3.4vw,1.1rem);line-height:1.6;color:#6b2140}
.small{margin-top:8px;font-weight:bold}
</style>
</head>
<body>
<div class="wrap">
<div class="tree">💖🌳</div>

<div class="card">
<h1>Happy Birthday! 🎉</h1>
<p>
May your day be filled with love, laughter and beautiful memories. 💖<br>
May all your dreams come true and happiness follow you wherever you go. ✨<br>
Wishing you endless joy, success and blessings today and always. 🌸
</p>
<p class="small">You deserve all the beautiful things life has to offer ❤️</p>
</div>
</div>

<script>
const icons=["💖","💕","❤️","✨","🌸"];
for(let i=0;i<35;i++){
 const d=document.createElement("div");
 d.className="float";
 d.innerHTML=icons[Math.floor(Math.random()*icons.length)];
 d.style.left=Math.random()*100+"%";
 d.style.fontSize=(16+Math.random()*20)+"px";
 d.style.animationDuration=(8+Math.random()*8)+"s";
 d.style.animationDelay=(-Math.random()*10)+"s";
 document.body.appendChild(d);
}
</script>
</body>
</html>
